<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>生活日記</title>
  <meta name="theme-color" content="#faf8f5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f5;
      --surface: #ffffff;
      --border: #e8e4de;
      --text: #2a2a2a;
      --text-muted: #888;
      --accent: #6b9b7a;
      --accent2: #c4896e;
      --radius: 16px;
      --radius-sm: 10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang TC", "Helvetica Neue", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--bg);
      padding: 12px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .header-title {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--accent);
    }
    .header-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-btn:active { background: var(--border); }

    /* ── Main content ── */
    main {
      padding-top: 60px;
      padding-bottom: 80px;
      min-height: 100vh;
    }

    /* ── Capture View ── */
    .view { display: none; padding: 16px; }
    .view.active { display: block; }

    .camera-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      background: #1a1a1a;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .camera-wrap video,
    .camera-wrap canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .camera-wrap canvas { display: none; }

    .camera-tip {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Style strip */
    .style-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .style-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: none;
    }
    .style-strip::-webkit-scrollbar { display: none; }

    .style-thumb {
      flex-shrink: 0;
      width: 64px;
      height: 64px;
      border-radius: 10px;
      overflow: hidden;
      border: 2.5px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      background: var(--border);
      position: relative;
    }
    .style-thumb canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .style-thumb.selected { border-color: var(--accent); transform: scale(1.08); }
    .style-thumb-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 0.6rem;
      text-align: center;
      padding: 2px 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Text input */
    .note-area {
      margin-top: 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.95rem;
      color: var(--text);
      resize: none;
      width: 100%;
      min-height: 56px;
      font-family: inherit;
      line-height: 1.5;
    }
    .note-area::placeholder { color: var(--text-muted); }
    .note-area:focus { outline: none; border-color: var(--accent); }

    /* Save button */
    .btn-save {
      margin-top: 14px;
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-save:active { opacity: 0.85; transform: scale(0.99); }
    .btn-save:disabled { opacity: 0.4; cursor: default; }

    /* ── Shutter button ── */
    .shutter-row {
      display: flex;
      justify-content: center;
      margin-top: 14px;
      gap: 20px;
      align-items: center;
    }
    .shutter-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid var(--accent);
      cursor: pointer;
      position: relative;
      transition: transform 0.1s;
    }
    .shutter-btn:active { transform: scale(0.92); }
    .shutter-btn::after {
      content: '';
      position: absolute;
      inset: 5px;
      background: var(--accent);
      border-radius: 50%;
      transition: background 0.2s;
    }
    .shutter-btn.captured::after { background: var(--accent2); }

    .flip-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #fff;
      font-size: 2rem;
      background: rgba(0,0,0,0.4);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Preview / Confirm ── */
    .preview-wrap {
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .preview-wrap.active { display: flex; }
    .preview-wrap img {
      width: 100%;
      border-radius: var(--radius);
      object-fit: cover;
    }
    .btn-row {
      display: flex;
      gap: 10px;
    }
    .btn-row button {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn-row button:active { opacity: 0.8; }
    .btn-retake { background: var(--border); color: var(--text); }
    .btn-confirm { background: var(--accent); color: #fff; }

    /* ── Diary Feed ── */
    .diary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }
    .diary-item {
      aspect-ratio: 1;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: var(--border);
    }
    .diary-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .diary-item:active img { transform: scale(1.05); }
    .diary-item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .diary-item:active .diary-item-overlay { opacity: 1; }
    .diary-item-date {
      position: absolute;
      bottom: 4px;
      left: 6px;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .emoji {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .empty-state p { font-size: 0.9rem; line-height: 1.6; }

    /* ── Detail Modal ── */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-inner {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-img {
      width: 100%;
      border-radius: var(--radius) var(--radius) 0 0;
      object-fit: cover;
      max-height: 70vh;
    }
    .modal-body { padding: 16px; }
    .modal-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .modal-note {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
    }
    .modal-style-tag {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 10px;
    }
    .modal-close {
      margin-top: 14px;
      width: 100%;
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-delete {
      margin-top: 8px;
      width: 100%;
      background: #fff0f0;
      color: #c44;
      border: 1px solid #fcc;
      border-radius: var(--radius-sm);
      padding: 10px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* ── Bottom Nav ── */
    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 6px 0;
      padding-bottom: max(6px, env(safe-area-inset-bottom));
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: var(--text-muted);
      font-size: 0.65rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-icon { font-size: 1.4rem; line-height: 1; }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeIn 0.3s ease; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    .modal-style-tag { margin: 10px 0; }
    .modal-music-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      margin: 10px 0;
      width: 100%;
    }
    .modal-music-btn:hover { opacity: 0.9; }
    .modal-music-loading { font-size: 13px; color: #888; margin-top: 8px; }
    .modal-music-result { margin-top: 8px; }
    .music-prompt-text {
      background: #f0f0f0; border-radius: 8px; padding: 10px;
      font-size: 13px; color: #333; line-height: 1.5; margin-bottom: 8px;
    }
    .btn-copy {
      background: #10b981; color: white; border: none;
      border-radius: 8px; padding: 6px 16px; font-size: 13px; cursor: pointer;
    }
    .btn-copy:hover { background: #059669; }

    /* Toast */
    .toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--text);
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 300;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-title">🌿 生活日記</div>
  <button class="header-btn" id="installBtn" style="display:none" aria-label="安裝 App">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    安裝
  </button>
</header>

<!-- Main -->
<main>

  <!-- ── Capture View ── -->
  <div class="view active" id="viewCapture">
    <div class="camera-wrap" id="cameraWrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="captureCanvas"></canvas>
      <div class="camera-tip" id="cameraTip">按下方的快門拍攝</div>
    </div>

    <!-- Preview / confirm (hidden until shot) -->
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="預覽" />
      <div class="btn-row">
        <button class="btn-retake" id="btnRetake">重拍</button>
        <button class="btn-confirm" id="btnConfirm">使用這張</button>
      </div>
    </div>

    <!-- Capture controls (hidden during preview) -->
    <div id="captureControls">
      <div class="style-label">濾鏡風格</div>
      <div class="style-strip" id="styleStrip"></div>

      <div style="margin-top:14px">
        <textarea class="note-area" id="noteInput" placeholder="寫下此刻的心情…（可跳過）" rows="2"></textarea>
      </div>

      <div class="shutter-row">
        <button class="flip-btn" id="flipBtn" title="切換鏡頭">⟲</button>
        <button class="shutter-btn" id="shutterBtn" title="拍攝"></button>
        <div style="width:44px"></div>
      </div>
    </div>
  </div>

  <!-- ── Diary View ── -->
  <div class="view" id="viewDiary">
    <div id="diaryEmpty" class="empty-state" style="display:none">
      <div class="emoji">🌱</div>
      <p>還沒有記錄<br/>按下方的相機，記錄今天的第一刻</p>
    </div>
    <div class="diary-grid" id="diaryGrid"></div>
  </div>

</main>

<!-- Bottom Nav -->
<nav>
  <button class="nav-btn active" data-view="viewCapture">
    <div class="nav-icon">📷</div>
    記錄
  </button>
  <button class="nav-btn" data-view="viewDiary">
    <div class="nav-icon">📖</div>
    日記
  </button>
</nav>

<!-- Detail Modal -->
<div class="modal" id="detailModal">
  <div class="modal-inner">
    <img class="modal-img" id="modalImg" src="" alt="" />
    <div class="modal-body">
      <div class="modal-date" id="modalDate"></div>
      <div class="modal-note" id="modalNote"></div>
      <div class="modal-style-tag" id="modalStyle"></div>
      <button class="modal-music-btn" id="modalMusicBtn" onclick="generateMusicPrompt()">🎵 AI 音樂</button>
      <div class="modal-music-result" id="modalMusicResult" style="display:none">
        <div class="music-prompt-text" id="musicPromptText"></div>
        <button class="btn-copy" id="btnCopyPrompt" onclick="copyMusicPrompt()">📋 複製</button>
      </div>
      <div class="modal-music-loading" id="modalMusicLoading" style="display:none">
        <span>🎧 思考音樂中...</span>
      </div>
    </div>
    <div style="padding: 0 16px 16px">
      <button class="modal-close" id="modalCloseBtn">關閉</button>
      <button class="modal-delete" id="modalDeleteBtn">刪除這筆</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  FILTERS (Canvas-based, no library)
// ═══════════════════════════════════════════

const FILTERS = [
  { id: 'original',  name: '原圖',       apply: (ctx, w, h) => {} },
  {
    id: 'comic', name: '漫畫風',
    apply: (ctx, w, h) => {
      // Posterize + edge darken
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      const levels = 6;
      for (let i = 0; i < d.length; i += 4) {
        d[i]   = Math.round(d[i]   / (256 / levels)) * (256 / levels);
        d[i+1] = Math.round(d[i+1] / (256 / levels)) * (256 / levels);
        d[i+2] = Math.round(d[i+2] / (256 / levels)) * (256 / levels);
        // Slight contrast boost
        const avg = (d[i] + d[i+1] + d[i+2]) / 3;
        const factor = 1.25;
        d[i]   = Math.min(255, Math.max(0, avg + (d[i]   - avg) * factor));
        d[i+1] = Math.min(255, Math.max(0, avg + (d[i+1] - avg) * factor));
        d[i+2] = Math.min(255, Math.max(0, avg + (d[i+2] - avg) * factor));
      }
      ctx.putImageData(imgData, 0, 0);
      // Overlay edge sketch
      const tmp = ctx.getImageData(0, 0, w, h);
      grayscale(ctx, w, h);
      invert(ctx, w, h);
      ctx.putImageData(tmp, 0, 0);
    }
  },
  {
    id: 'bw', name: '黑白藝術',
    apply: (ctx, w, h) => {
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const avg = d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11;
        const v = avg > 128 ? 255 : 0; // threshold
        d[i] = d[i+1] = d[i+2] = v;
      }
      ctx.putImageData(imgData, 0, 0);
      // Grain
      addGrain(ctx, w, h, 40);
    }
  },
  {
    id: 'vintage', name: '復古底片',
    apply: (ctx, w, h) => {
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        d[i]   = Math.min(255, d[i]   * 1.1 + 15);  // R boost warm
        d[i+1] = Math.min(255, d[i+1] * 1.0 + 5);   // G
        d[i+2] = Math.max(0,   d[i+2] * 0.85 - 10); // B reduce = warm tone
        // Slight vignette
        const cx = w / 2, cy = h / 2;
        const px = (i / 4) % w, py = Math.floor((i / 4) / w);
        const dist = Math.sqrt((px-cx)**2 + (py-cy)**2) / Math.sqrt(cx**2+cy**2);
        const vign = 1 - dist * 0.3;
        d[i]   = Math.min(255, d[i]   * vign);
        d[i+1] = Math.min(255, d[i+1] * vign);
        d[i+2] = Math.min(255, d[i+2] * vign);
      }
      ctx.putImageData(imgData, 0, 0);
      addGrain(ctx, w, h, 18);
    }
  },
  {
    id: 'vivid', name: '日系清新',
    apply: (ctx, w, h) => {
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        // Desaturate + tint blue-green
        const avg = (d[i] + d[i+1] + d[i+2]) / 3;
        d[i]   = Math.round(d[i]   * 0.65 + avg * 0.35);
        d[i+1] = Math.round(d[i+1] * 0.72 + avg * 0.28);
        d[i+2] = Math.round(d[i+2] * 0.80 + avg * 0.20);
        // Brightness lift
        d[i]   = Math.min(255, d[i]   * 1.05 + 5);
        d[i+1] = Math.min(255, d[i+1] * 1.05 + 5);
        d[i+2] = Math.min(255, d[i+2] * 1.05 + 5);
      }
      ctx.putImageData(imgData, 0, 0);
    }
  },
  {
    id: 'cyberpunk', name: '賽博龐克',
    apply: (ctx, w, h) => {
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        // High contrast + color punch
        const avg = (d[i] + d[i+1] + d[i+2]) / 3;
        d[i]   = Math.min(255, Math.max(0, avg + (d[i]   - avg) * 1.8));
        d[i+1] = Math.min(255, Math.max(0, avg + (d[i+1] - avg) * 1.1));
        d[i+2] = Math.min(255, Math.max(0, avg + (d[i+2] - avg) * 2.2));
        // Darken shadows
        const luma = (d[i]+d[i+1]+d[i+2])/3;
        if (luma < 60) {
          d[i]   = d[i]   * 0.6;
          d[i+1] = d[i+1] * 0.5;
          d[i+2] = d[i+2] * 0.7;
        }
      }
      ctx.putImageData(imgData, 0, 0);
    }
  },
  {
    id: 'watercolor', name: '水彩渲染',
    apply: (ctx, w, h) => {
      // Soft blur + slight saturation boost + edge highlight
      ctx.filter = 'blur(1.5px) saturate(1.3) brightness(1.05)';
      ctx.drawImage(ctx.canvas, 0, 0, w, h);
      ctx.filter = 'none';
    }
  },
  {
    id: 'pixel', name: '像素風',
    apply: (ctx, w, h) => {
      const pixelSize = Math.max(4, Math.round(Math.min(w, h) / 80));
      const tmp = document.createElement('canvas');
      tmp.width = Math.ceil(w / pixelSize);
      tmp.height = Math.ceil(h / pixelSize);
      const tctx = tmp.getContext('2d');
      tctx.imageSmoothingEnabled = false;
      tctx.drawImage(ctx.canvas, 0, 0, tmp.width, tmp.height);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(tmp, 0, 0, w, h);
    }
  },
  {
    id: 'sketch', name: '極簡素描',
    apply: (ctx, w, h) => {
      // Grayscale + high contrast + invert
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const avg = d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11;
        const v = avg > 100 ? 255 : 0;
        d[i] = d[i+1] = d[i+2] = v;
      }
      ctx.putImageData(imgData, 0, 0);
      invert(ctx, w, h);
    }
  },
];

function grayscale(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const avg = d[i]*0.3 + d[i+1]*0.59 + d[i+2]*0.11;
    d[i] = d[i+1] = d[i+2] = avg;
  }
  ctx.putImageData(imgData, 0, 0);
}

function invert(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    d[i] = 255 - d[i];
    d[i+1] = 255 - d[i+1];
    d[i+2] = 255 - d[i+2];
  }
  ctx.putImageData(imgData, 0, 0);
}

function addGrain(ctx, w, h, amount) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * amount;
    d[i]   = Math.min(255, Math.max(0, d[i]   + n));
    d[i+1] = Math.min(255, Math.max(0, d[i+1] + n));
    d[i+2] = Math.min(255, Math.max(0, d[i+2] + n));
  }
  ctx.putImageData(imgData, 0, 0);
}

// Apply filter to canvas (srcImage can be HTMLImageElement or canvas)
function applyFilterToCanvas(src, canvas, filterId) {
  const ctx = canvas.getContext('2d');
  canvas.width = src.naturalWidth || src.width;
  canvas.height = src.naturalHeight || src.height;
  ctx.drawImage(src, 0, 0, canvas.width, canvas.height);
  const f = FILTERS.find(f => f.id === filterId);
  if (f) f.apply(ctx, canvas.width, canvas.height);
}

// Generate thumbnail for style strip
function makeStyleThumb(filterId, srcImg) {
  const thumb = document.createElement('div');
  thumb.className = 'style-thumb';
  const c = document.createElement('canvas');
  thumb.appendChild(c);
  const name = document.createElement('div');
  name.className = 'style-thumb-name';
  const f = FILTERS.find(f => f.id === filterId);
  name.textContent = f ? f.name : filterId;
  thumb.appendChild(name);

  const ctx = c.getContext('2d');
  c.width = 128;
  c.height = 128;

  // Draw a placeholder gradient with filter applied
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = srcImg.naturalWidth || srcImg.width;
  tmpCanvas.height = srcImg.naturalHeight || srcImg.height;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.drawImage(srcImg, 0, 0, tmpCanvas.width, tmpCanvas.height);
  const f2 = FILTERS.find(f => f.id === filterId);
  if (f2) f2.apply(tmpCtx, tmpCanvas.width, tmpCanvas.height);

  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(tmpCanvas, 0, 0, 128, 128);

  return thumb;
}

// ═══════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════

let currentStream = null;
let facingMode = 'environment';

async function startCamera() {
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());
  try {
    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1200 }, height: { ideal: 1600 } },
      audio: false
    });
    const v = document.getElementById('video');
    v.srcObject = currentStream;
    // 等 video 真正就緒後再允許拍攝
    await new Promise(resolve => {
      if (v.readyState >= 1) resolve();
      else v.addEventListener('loadedmetadata', resolve, { once: true });
    });
    document.getElementById('cameraTip').style.display = '';
  } catch (e) {
    document.getElementById('cameraTip').textContent = '無法開啟相機，請確認相機權限';
  }
}

document.getElementById('flipBtn').addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

// ═══════════════════════════════════════════
//  CAPTURE FLOW
// ═══════════════════════════════════════════

let capturedBlob = null;
let capturedBase64 = null;
let currentFilter = 'original';

function capturePhoto() {
  const v = document.getElementById('video');
  const c = document.getElementById('captureCanvas');

  if (!v.videoWidth || !v.videoHeight) {
    showToast('相機尚未就緒，請稍候');
    return;
  }

  c.width = v.videoWidth;
  c.height = v.videoHeight;
  const ctx = c.getContext('2d');
  ctx.drawImage(v, 0, 0);
  c.toBlob(blob => {
    capturedBlob = blob;
    capturedBase64 = URL.createObjectURL(blob);
    showPreview(capturedBase64);
  }, 'image/jpeg', 0.92);
}

function showPreview(url) {
  document.getElementById('video').style.display = 'none';
  document.getElementById('captureCanvas').style.display = '';
  const img = document.getElementById('previewImg');
  img.src = url;
  document.getElementById('previewWrap').classList.add('active');
  document.getElementById('styleStrip').style.display = 'none';
  document.getElementById('captureControls').style.display = 'none';
  document.getElementById('shutterBtn').style.display = 'none';
  document.getElementById('flipBtn').style.display = 'none';
}

function resetCapture() {
  capturedBlob = null;
  if (capturedBase64) { URL.revokeObjectURL(capturedBase64); capturedBase64 = null; }
  const v = document.getElementById('video');
  v.style.display = '';
  document.getElementById('captureCanvas').style.display = 'none';
  document.getElementById('previewWrap').classList.remove('active');
  document.getElementById('styleStrip').style.display = '';
  document.getElementById('captureControls').style.display = '';
  document.getElementById('shutterBtn').style.display = '';
  document.getElementById('flipBtn').style.display = '';
}

document.getElementById('shutterBtn').addEventListener('click', () => {
  const btn = document.getElementById('shutterBtn');
  btn.classList.add('captured');
  setTimeout(() => btn.classList.remove('captured'), 300);
  capturePhoto();
});

document.getElementById('btnRetake').addEventListener('click', resetCapture);

document.getElementById('btnConfirm').addEventListener('click', async () => {
  // Apply current filter to the captured blob
  const srcImg = new Image();
  srcImg.src = capturedBase64;
  srcImg.onload = () => {
    const c = document.createElement('canvas');
    c.width = srcImg.naturalWidth;
    c.height = srcImg.naturalHeight;
    applyFilterToCanvas(srcImg, c, currentFilter);
    c.toBlob(async blob => {
      const entry = {
        id: Date.now(),
        date: new Date().toISOString(),
        filter: currentFilter,
        note: document.getElementById('noteInput').value.trim(),
        dataUrl: await blobToDataUrl(blob)
      };
      await saveEntry(entry);
      showToast('已儲存 🌿');
      resetCapture();
      document.getElementById('noteInput').value = '';
    }, 'image/jpeg', 0.9);
  };
});

function blobToDataUrl(blob) {
  return new Promise(res => {
    const fr = new FileReader();
    fr.onload = e => res(e.target.result);
    fr.readAsDataURL(blob);
  });
}

// ═══════════════════════════════════════════
//  INDEXEDDB
// ═══════════════════════════════════════════

const DB_NAME = 'LifeDiaryDB';
const DB_VER = 1;
const STORE = 'entries';
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE))
        db.createObjectStore(STORE, { keyPath: 'id' });
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}

function saveEntry(entry) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(entry);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

function getAllEntries() {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result.sort((a, b) => b.id - a.id));
    req.onerror = () => rej(req.error);
  });
}

function deleteEntry(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

// ═══════════════════════════════════════════
//  STYLE STRIP
// ═══════════════════════════════════════════

let styleSrcImg = null;

function initStyleStrip() {
  const strip = document.getElementById('styleStrip');
  strip.innerHTML = '';

  // Create a placeholder image for thumbnails
  const placeholder = new Image();
  placeholder.crossOrigin = 'anonymous';
  placeholder.src = 'data:image/svg+xml,' + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
      <rect width="400" height="500" fill="#d4c5b0"/>
      <circle cx="200" cy="200" r="60" fill="#b8a080"/>
      <circle cx="320" cy="150" r="30" fill="#e8d8c0"/>
      <rect x="50" y="320" width="300" height="80" rx="8" fill="#c0a880"/>
    </svg>
  `);
  placeholder.onload = () => {
    styleSrcImg = placeholder;
    FILTERS.forEach(f => {
      const thumb = makeStyleThumb(f.id, styleSrcImg);
      thumb.dataset.filter = f.id;
      thumb.addEventListener('click', () => {
        document.querySelectorAll('.style-thumb').forEach(t => t.classList.remove('selected'));
        thumb.classList.add('selected');
        currentFilter = f.id;
      });
      strip.appendChild(thumb);
    });
    // Select original by default
    strip.querySelector('[data-filter="original"]')?.classList.add('selected');
  };
  placeholder.onerror = () => {
    // Fallback: create canvas thumbnail
    const cvs = document.createElement('canvas');
    cvs.width = 400; cvs.height = 500;
    const ctx = cvs.getContext('2d');
    ctx.fillStyle = '#d4c5b0';
    ctx.fillRect(0, 0, 400, 500);
    styleSrcImg = cvs;
    FILTERS.forEach(f => {
      const thumb = makeStyleThumb(f.id, styleSrcImg);
      thumb.dataset.filter = f.id;
      thumb.addEventListener('click', () => {
        document.querySelectorAll('.style-thumb').forEach(t => t.classList.remove('selected'));
        thumb.classList.add('selected');
        currentFilter = f.id;
      });
      strip.appendChild(thumb);
    });
    strip.querySelector('[data-filter="original"]')?.classList.add('selected');
  };
}

// ═══════════════════════════════════════════
//  DIARY FEED
// ═══════════════════════════════════════════

async function renderDiary() {
  const grid = document.getElementById('diaryGrid');
  const empty = document.getElementById('diaryEmpty');
  const entries = await getAllEntries();
  grid.innerHTML = '';

  if (entries.length === 0) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  entries.forEach(entry => {
    const item = document.createElement('div');
    item.className = 'diary-item';
    item.dataset.id = entry.id;
    item.innerHTML = `<img src="${entry.dataUrl}" alt="diary" loading="lazy" />
      <div class="diary-item-overlay">
        <div class="diary-item-date">${formatDate(entry.date)}</div>
      </div>`;
    item.addEventListener('click', () => showDetail(entry));
    grid.appendChild(item);
  });
}

function formatDate(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

// ═══════════════════════════════════════════
//  DETAIL MODAL
// ═══════════════════════════════════════════

let currentEntryId = null;
let currentEntry = null; // 儲存完整 entry 供音樂功能使用

function showDetail(entry) {
  currentEntryId = entry.id;
  currentEntry = entry; // 保留完整物件
  const f = FILTERS.find(f => f.id === entry.filter);
  document.getElementById('modalImg').src = entry.dataUrl;
  document.getElementById('modalDate').textContent = formatDate(entry.date);
  document.getElementById('modalNote').textContent = entry.note || '（無備註）';
  document.getElementById('modalStyle').textContent = f ? f.name : entry.filter;
  // 重置音樂區塊
  document.getElementById('modalMusicBtn').style.display = 'block';
  document.getElementById('modalMusicLoading').style.display = 'none';
  document.getElementById('modalMusicResult').style.display = 'none';
  document.getElementById('detailModal').classList.add('active');
}

document.getElementById('modalCloseBtn').addEventListener('click', () => {
  document.getElementById('detailModal').classList.remove('active');
});

document.getElementById('modalDeleteBtn').addEventListener('click', async () => {
  if (!currentEntryId) return;
  await deleteEntry(currentEntryId);
  document.getElementById('detailModal').classList.remove('active');
  showToast('已刪除');
  renderDiary();
});

document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target === document.getElementById('detailModal'))
    document.getElementById('detailModal').classList.remove('active');
});

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const viewId = btn.dataset.view;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (viewId === 'viewDiary') renderDiary();
  });
});

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════
//  MUSIC AI (Gemini via Oracle VPS)
// ═══════════════════════════════════════════
const MUSIC_API = 'http://161.33.0.181:5000/generate-music-prompt';
let currentMusicPrompt = '';
let currentDetailEntry = null;

function generateMusicPrompt() {
  if (!currentEntry) return;

  document.getElementById('modalMusicBtn').style.display = 'none';
  document.getElementById('modalMusicLoading').style.display = 'block';
  document.getElementById('modalMusicResult').style.display = 'none';

  const base64 = currentEntry.dataUrl.replace(/^data:image\/\w+;base64,/, '');
  fetch(MUSIC_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ image_base64: base64 })
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById('modalMusicLoading').style.display = 'none';
    if (data.prompt) {
      currentMusicPrompt = data.prompt;
      document.getElementById('musicPromptText').textContent = data.prompt;
      document.getElementById('modalMusicResult').style.display = 'block';
    } else {
      showToast('生成失敗：' + (data.error || '未知錯誤'));
      document.getElementById('modalMusicBtn').style.display = 'block';
    }
  })
  .catch(err => {
    document.getElementById('modalMusicLoading').style.display = 'none';
    document.getElementById('modalMusicBtn').style.display = 'block';
    showToast('網路錯誤：' + err.message);
  });
}

function copyMusicPrompt() {
  if (!currentMusicPrompt) return;
  navigator.clipboard.writeText(currentMusicPrompt).then(() => {
    showToast('已複製到剪貼簿 🎵');
  }).catch(() => {
    showToast('複製失敗');
  });
}

// ═══════════════════════════════════════════
//  PWA INSTALL BANNER (選填)
// ═══════════════════════════════════════════

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = '';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBtn').style.display = 'none';
  if (outcome === 'accepted') showToast('已安裝 🌿');
});
