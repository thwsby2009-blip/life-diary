<script>
// ... 前面 FILTERS、CAMERA、CAPTURE FLOW、INDEXEDDB、STYLE STRIP、DIARY FEED、DETAIL MODAL 的程式碼保持不變 ...

// ═══════════════════════════════════════════
//  NAVIGATION (修正與補全)
// ═══════════════════════════════════════════

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const viewId = btn.dataset.view;
    
    // 切換導覽鈕的 active 狀態
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    // 切換畫面的顯示
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const targetView = document.getElementById(viewId);
    if (targetView) {
      targetView.classList.add('active');
      targetView.classList.add('animate-in');
    }
    
    // 如果切換到日記頁面，重新撈取資料庫並渲染
    if (viewId === 'viewDiary') {
      renderDiary();
    }
  });
});

// ═══════════════════════════════════════════
//  TOAST & INITIALIZATION
// ═══════════════════════════════════════════

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// 頁面載入完成後的初始化程序
document.addEventListener('DOMContentLoaded', async () => {
  try {
    await openDB();       // 1. 打開 IndexedDB
    initStyleStrip();     // 2. 初始化濾鏡列
    await startCamera();  // 3. 啟動相機
  } catch (error) {
    console.error("初始化失敗:", error);
    showToast("資料庫或相機初始化失敗");
  }
});

// ═══════════════════════════════════════════
//  PWA INSTALL BANNER (選填)
// ═══════════════════════════════════════════
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const installBtn = document.getElementById('installBtn');
  if (installBtn) installBtn.style.display = 'flex';
});

document.getElementById('installBtn')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('installBtn').style.display = 'none';
  }
  deferredPrompt = null;
});
</script>
</body>
</html>
